<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有课程 - THU选课社区</title>
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="data/optimized/manifest.json" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="data/optimized/views_summary.json" as="fetch" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-nav">
        <div class="nav-wrap">
            <a href="index.html" class="logo">THU选课社区</a>
            <a href="index.html" class="nav-item">最新</a>
            <a href="courses.html" class="nav-item active">课程</a>
            <a href="statistics.html" class="nav-item">数据统计</a>
            <a href="search.html" class="search-btn-icon search-button" aria-label="搜索">
                <svg viewBox="64 64 896 896" fill="currentColor"><path d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0011.6 0l43.6-43.5a8.2 8.2 0 000-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.2 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z"/></svg>
            </a>
        </div>
    </div>

    <div class="container">
        <div class="page-title" style="margin-bottom:20px;">所有课程</div>

        <div class="courses-layout">
            <!-- Sidebar Filter -->
            <aside class="sidebar-filter">
                <div class="filter-header">
                    <span>筛选</span>
                    <button class="filter-confirm" onclick="applyFilters()">确认</button>
                </div>

                <div class="filter-section">
                    <div class="filter-group-title" data-target="filter-review" onclick="toggleFilterGroup(this)">
                        <span class="arrow open">&#9654;</span> 点评
                    </div>
                    <div class="filter-options show" id="filter-review">
                        <label class="filter-option">
                            <input type="checkbox" id="filter-has-reviews"> 仅显示有点评的课程
                        </label>
                    </div>
                </div>

                <div class="filter-section">
                    <div class="filter-group-title" data-target="filter-dept" onclick="toggleFilterGroup(this)">
                        <span class="arrow open">&#9654;</span> 开课单位
                    </div>
                    <div class="filter-options show" id="filter-dept">
                        <!-- dynamically populated -->
                    </div>
                </div>
            </aside>

            <!-- Course List -->
            <main class="courses-main">
                <div class="courses-count">共有<span id="all-course-num">0</span>门课</div>
                <div id="all-course-list"></div>
                <div id="course-pagination" class="pagination"></div>
            </main>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="about.html">关于</a>
            <a href="faq.html">常见问题</a>
        </div>
        <div>&copy;2024 THU选课社区</div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
