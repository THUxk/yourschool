<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - THUxk</title>
    <style>
        /* ========== CSS Variables ========== */
        :root {
            --primary-color: #8a4abf;
            --primary-hover: #7a3dd8;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-tertiary: #999;
            --border-color: #e8e8e8;
            --bg-page: #f5f5f5;
            --bg-white: #fff;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 10px;
            --layout-width: 1200px;
            --layout-margin: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        /* ========== Reset & Base ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0 !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.6;
        }
        a { text-decoration: none; color: inherit; }
        a:hover { color: var(--primary-color); }
        .container { max-width: var(--layout-width); margin: 0 auto; }

        /* ========== Hero Section ========== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 20px 80px;
            background: radial-gradient(ellipse at 30% 20%, rgba(138, 74, 240, 0.08) 0%, transparent 40%),
                        radial-gradient(ellipse at 70% 80%, rgba(138, 74, 240, 0.06) 0%, transparent 40%);
        }
        .hero-content {
            text-align: center;
            max-width: 680px;
            margin: 0 auto;
        }
        .hero-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 48px;
            line-height: 1.7;
        }

        /* ========== Cards ========== */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 840px;
            margin: 0 auto;
        }
        .card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: rgba(138, 74, 240, 0.15);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card:hover::before { opacity: 1; }
        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 28px;
            transition: transform 0.3s ease;
        }
        .card:hover .card-icon { transform: scale(1.1) rotate(3deg); }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.7;
        }
        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--bg-page);
            color: var(--primary-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .card-link:hover {
            background: var(--primary-color);
            color: #fff;
        }
        .card-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            transition: transform 0.2s ease;
        }
        .card-link:hover svg { transform: translateX(4px); }

        /* Card specific icons */
        .book-icon {
            background: linear-gradient(135deg, #e8f4f8 0%, #d0e6f2 100%);
            color: #1a73e8;
        }
        .course-icon {
            background: linear-gradient(135deg, #f0e8f5 0%, #e5d5f0 100%);
            color: var(--primary-color);
        }

        /* ========== Footer ========== */
        .footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            color: var(--text-tertiary);
            font-size: 13px;
        }
        .footer-links { margin-bottom: 6px; }
        .footer-links a {
            margin: 0 6px;
            color: var(--primary-color);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .hero {
                padding: 32px 20px 60px;
                min-height: auto;
            }
            .hero-title {
                font-size: 28px;
            }
            .hero-subtitle {
                font-size: 16px;
            }
            .cards-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .card {
                padding: 24px 20px;
            }
            .card-icon {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <main class="hero">
            <div class="hero-content">
                <h1 class="hero-title">欢迎进入 THUxk</h1>
                <p class="hero-subtitle">
                    选择您想进入的空间，探索丰富的学术资源与学习社区
                </p>

                <div class="cards-container">
                    <!-- thubook Card -->
                    <a href="/thubook" class="card">
                        <div class="card-icon book-icon">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                            </svg>
                        </div>
                        <h2 class="card-title">Thubook 手册</h2>
                        <p class="card-desc">
                            浏览你请生存手册。
                        </p>
                        <span class="card-link">
                            进入 Thubook
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12h14"></path>
                                <path d="M12 5l7 7-7 7"></path>
                            </svg>
                        </span>
                    </a>

                    <!-- thucourse Card -->
                    <a href="/thucourse" class="card">
                        <div class="card-icon course-icon">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="9" y1="3" x2="9" y2="21"></line>
                                <path d="M10 9h4"></path>
                                <path d="M12 15h2"></path>
                            </svg>
                        </div>
                        <h2 class="card-title">Thucourse 选课社区</h2>
                        <p class="card-desc">
                            探索校内课程资源，查看课程评分与真实点评，
                            与同学们交流选课经验，找到最适合你的课程。
                        </p>
                        <span class="card-link">
                            进入选课社区
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12h14"></path>
                                <path d="M12 5l7 7-7 7"></path>
                            </svg>
                        </span>
                    </a>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-links">
                <a href="/thucourse">选课社区</a>
                <a href="/thubook">THU手册</a>
            </div>
            <p>© 2026 THUxk </p>
        </footer>
    </div>
</body>
</html>
