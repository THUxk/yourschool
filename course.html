<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程详情 - THU选课社区</title>
    <link href="css/style.css" as="style">
    <link href="data/optimized/manifest.json" as="fetch" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-nav">
        <div class="nav-wrap">
            <a href="index.html" class="logo">THU选课社区</a>
            <a href="index.html" class="nav-item">最新</a>
            <a href="courses.html" class="nav-item">课程</a>
            <a href="statistics.html" class="nav-item">数据统计</a>
            <a href="search.html" class="search-btn-icon search-button" aria-label="搜索">
                <svg viewBox="64 64 896 896" fill="currentColor"><path d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0011.6 0l43.6-43.5a8.2 8.2 0 000-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.2 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z"/></svg>
            </a>
        </div>
    </div>

    <div class="container">
        <div class="page-title" style="margin-bottom:20px;" id="detail-page-title"></div>

        <div class="course-detail-layout">
            <!-- Left sidebar -->
            <aside class="detail-sidebar">
                <div class="info-card">
                    <div class="info-card-title">课程信息</div>
                    <div class="info-row"><span class="label">课程名：</span><span class="value" id="cd-name"></span></div>
                    <div class="info-row"><span class="label">开课教师：</span><span class="value" id="cd-teacher"></span></div>
                    <div class="info-row"><span class="label">开课单位：</span><span class="value" id="cd-dept"></span></div>
                    <div class="info-row"><span class="label">推荐指数：</span><span class="value" id="cd-rating"></span></div>
                </div>

                <div class="info-card" id="teacher-courses-card" style="display:none;">
                    <div class="info-card-title" id="teacher-courses-title"></div>
                    <ul class="teacher-courses-list" id="teacher-courses-list"></ul>
                </div>
            </aside>

            <!-- Right main -->
            <main class="detail-main">
                <div class="detail-head">
                    <h2 id="review-count-title">点评 (0条)</h2>
                    <div class="detail-head-actions">
                        <button class="btn-outline" onclick="toggleTrend()">趋势</button>
                        <a href="#" class="btn-primary" id="new-review-btn-detail">
                            <svg viewBox="64 64 896 896" width="1em" height="1em" fill="currentColor"><path d="M257.7 752c2 0 4-.2 6-.5L431.9 722c2-.4 3.9-1.3 5.3-2.8l423.9-423.9a9.96 9.96 0 000-14.1L694.9 114.9c-1.9-1.9-4.4-2.9-7.1-2.9s-5.2 1-7.1 2.9L256.8 538.8c-1.5 1.5-2.4 3.3-2.8 5.3l-29.5 168.2a33.5 33.5 0 009.4 29.8c6.6 6.4 14.9 9.9 23.8 9.9zm67.4-174.4L687.8 215l73.3 73.3-362.7 362.6-88.9 15.7 15.6-89zM880 836H144c-17.7 0-32 14.3-32 32v36c0 4.4 3.6 8 8 8h784c4.4 0 8-3.6 8-8v-36c0-17.7-14.3-32-32-32z"/></svg>
                            <span>新点评</span>
                        </a>
                    </div>
                </div>

                <div class="review-filters">
                    <label>排序:</label>
                    <select id="sort-select" onchange="renderCourseDetailReviews()">
                        <option value="newest">最新回复</option>
                        <option value="oldest">最早回复</option>
                        <option value="rating-high">推荐高到低</option>
                        <option value="rating-low">推荐低到高</option>
                    </select>
                    <label style="margin-left:10px;">学期:</label>
                    <select id="semester-select" onchange="renderCourseDetailReviews()">
                        <option value="">全部</option>
                    </select>
                    <label style="margin-left:10px;">推荐指数:</label>
                    <select id="rating-select" onchange="renderCourseDetailReviews()">
                        <option value="">全部</option>
                        <option value="5">5</option>
                        <option value="4">4</option>
                        <option value="3">3</option>
                        <option value="2">2</option>
                        <option value="1">1</option>
                    </select>
                    <label style="margin-left:10px;">筛选</label>
                </div>

                <div id="course-review-list"></div>
                <div id="course-detail-pagination" class="pagination"></div>
            </main>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="about.html">关于</a>
            <a href="faq.html">常见问题</a>
        </div>
        <div>&copy;2024 THU选课社区</div>
    </footer>

    <!-- Trend Modal -->
    <div class="trend-overlay" id="trend-modal" onclick="closeTrend(event)">
        <div class="trend-backdrop"></div>
        <div class="trend-modal">
            <div class="trend-modal-header">
                <span class="trend-modal-title" id="trend-title">点评趋势</span>
                <button class="trend-modal-close" onclick="closeTrend()">&times;</button>
            </div>
            <div class="trend-modal-body">
                <div class="trend-chart-wrap">
                    <canvas id="trend-chart-canvas"></canvas>
                </div>
                <div class="trend-legend">
                    <span class="trend-legend-item"><i class="trend-legend-dot bar"></i>点评数量</span>
                    <span class="trend-legend-item"><i class="trend-legend-dot line"></i>平均评分</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
