name: Merge new reviews into course data, update index, and manage latest reviews

on:
  push:
    branches: [data]
    paths:
      - 'new_*.json'

env:
  MAX_LATEST_REVIEWS: 100

jobs:
  merge-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    concurrency:
      group: merge-reviews-data-branch
      cancel-in-progress: false   # 排队，不取消

    steps:
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed new_*.json files
        id: get-files
        run: |
          git diff --name-only HEAD~1 HEAD | grep '^new_.*\.json$' > changed_files.txt
          echo "Files to process:"
          cat changed_files.txt || echo "(none)"
          if [ -s changed_files.txt ]; then
            tr '\n' ' ' < changed_files.txt | sed 's/ $//' > file_list.txt
            echo "FILES=$(cat file_list.txt)" >> $GITHUB_ENV
          else
            echo "FILES=" >> $GITHUB_ENV
          fi

      - name: Prepare main branch workspace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p main-workspace
          cd main-workspace
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git fetch origin main --quiet
          git checkout FETCH_HEAD
          mkdir -p data/courses

      - name: Process each new review, merge into course files, and collect data
        working-directory: ./main-workspace
        run: |
          echo -n "" > ../updated_sqids.txt
          echo "[]" > ../new_reviews_for_latest.json
          REVIEW_COUNT=0

          # --- Determine the starting comment ID ---
          LATEST_FILE="data/reviews_latest.json"
          if [ -f "$LATEST_FILE" ] && [ "$(jq length "$LATEST_FILE")" -gt 0 ]; then
            current_max_id=$(jq -r '.[0].id' "$LATEST_FILE")
            echo "Starting from existing max comment ID: $current_max_id"
          else
            current_max_id=0
            echo "Starting from scratch, initial comment ID will be 1"
          fi

          for file in ${{ env.FILES }}; do
            if [ -z "$file" ] || [ ! -f "../$file" ]; then
              continue
            fi

            echo "Processing $file..."

            if ! jq 'has("id") and has("rating") and has("comment")' "../$file" > /dev/null 2>&1; then
              echo "⚠️ SKIP (invalid format): $file"
              continue
            fi

            course_sqid=$(jq -r '.id // "null"' "../$file")
            if [ "$course_sqid" = "null" ] || [ -z "$course_sqid" ]; then
              echo "⚠️ SKIP (missing/invalid course_sqid): $file"
              continue
            fi

            current_max_id=$((current_max_id + 1))
            comment_id=$current_max_id
            echo "Assigned sequential Comment ID: $comment_id"

            target_file="data/courses/${course_sqid}.json"
            echo "Target file: $target_file"

            if [ ! -f "$target_file" ]; then
              echo "Creating new course file for sqid: $course_sqid"
              jq -n --argjson new_review "$(cat "../$file")" --argjson comment_id "$comment_id" '{
                "count": 1,
                "next": null,
                "previous": null,
                "results": [($new_review | .id = $comment_id)]
              }' > "$target_file"
              echo "$course_sqid" >> ../updated_sqids.txt
              REVIEW_COUNT=$((REVIEW_COUNT + 1))
            else
              if jq -e --argjson cid "$comment_id" 'any(.results[]; .id == $cid)' "$target_file" > /dev/null; then
                echo "❌ CRITICAL: Duplicate comment ID $comment_id found in course file!"
                exit 1
              fi

              echo "✅ Merging comment (id=$comment_id) into course $course_sqid"
              jq --argjson new_review "$(cat "../$file")" --argjson comment_id "$comment_id" '
                .results += [($new_review | .id = $comment_id)] |
                .count = (.results | length)
              ' "$target_file" > temp.json && mv temp.json "$target_file"
              echo "$course_sqid" >> ../updated_sqids.txt
              REVIEW_COUNT=$((REVIEW_COUNT + 1))
            fi

            FULL_INDEX_PATH="data/full_index.json"
            if [ ! -f "$FULL_INDEX_PATH" ]; then
              echo "❌ Error: data/full_index.json not found!"
              exit 1
            fi

            COURSE_INFO=$(jq -r --argjson target_sqid "$course_sqid" '
              .courses | to_entries[] | select(.value.sqid == $target_sqid) | .value
            ' "$FULL_INDEX_PATH")

            if [ -z "$COURSE_INFO" ] || [ "$COURSE_INFO" = "null" ]; then
              COURSE_NAME="Unknown Course"
              COURSE_TEACHER="Unknown Teacher"
            else
              COURSE_NAME=$(echo "$COURSE_INFO" | jq -r '.kcm')
              COURSE_TEACHER=$(echo "$COURSE_INFO" | jq -r '.jsm')
            fi

            ENRICHED_REVIEW=$(jq -n \
              --argjson original_review "$(cat "../$file")" \
              --argjson course_sqid "$course_sqid" \
              --arg course_name "$COURSE_NAME" \
              --arg course_teacher "$COURSE_TEACHER" \
              --argjson comment_id "$comment_id" \
              '{
                "id": $comment_id,
                "course": { "id": $course_sqid },
                "rating": ($original_review.rating // 0),
                "comment": ($original_review.comment // ""),
                "created_at": ($original_review.created_at // ""),
                "score": ($original_review.score // null),
                "_course_name": $course_name,
                "_course_teacher": $course_teacher
              }')

            jq --argjson new_r "$ENRICHED_REVIEW" '. += [$new_r]' ../new_reviews_for_latest.json > ../temp_new_reviews.json
            mv ../temp_new_reviews.json ../new_reviews_for_latest.json

          done

          sort -u ../updated_sqids.txt -o ../updated_sqids.txt
          echo "Final comment ID after processing: $current_max_id"
          echo $REVIEW_COUNT > ../review_count.txt

      - name: Update with_comment_index.json
        working-directory: ./main-workspace
        run: |
          FULL_INDEX_PATH="data/full_index.json"
          if [ ! -f "$FULL_INDEX_PATH" ]; then
            echo "❌ Error: data/full_index.json not found on main branch!"
            exit 1
          fi

          # 初始化 with_comment_index.json（如果不存在）
          if [ ! -f "data/with_comment_index.json" ]; then
            jq -n '{ courses: {} }' > data/with_comment_index.json
            echo "Initialized empty with_comment_index.json"
          fi

          while IFS= read -r sqid; do
            if [ -z "$sqid" ]; then
              continue
            fi

            echo "Updating index for course sqid: $sqid"
            COURSE_FILE="data/courses/${sqid}.json"
            if [ ! -f "$COURSE_FILE" ]; then
              echo "⚠️ Course file missing for sqid $sqid, skipping index update."
              continue
            fi

            COUNT=$(jq '.count' "$COURSE_FILE")
            AVG=$(jq '[.results[].rating] | add / length' "$COURSE_FILE")

            # 从 full_index.json 中找到完整的课程数据
            FULL_COURSE_ENTRY=$(jq -r --argjson target_sqid "$sqid" '
              .courses | to_entries[] | select(.value.sqid == $target_sqid) | { key: .key, value: .value }
            ' "$FULL_INDEX_PATH")

            if [ -z "$FULL_COURSE_ENTRY" ] || [ "$FULL_COURSE_ENTRY" = "null" ]; then
              echo "    ⚠️ Course with sqid $sqid not found in full_index.json."
              continue
            fi

            DISPLAY_KEY=$(echo "$FULL_COURSE_ENTRY" | jq -r '.key')
            FULL_VALUE=$(echo "$FULL_COURSE_ENTRY" | jq '.value')

            if [ -z "$DISPLAY_KEY" ] || [ "$DISPLAY_KEY" = "null" ]; then
              echo "    ⚠️ Invalid display key for sqid $sqid."
              continue
            fi

            # 构建新的课程条目：完整复制 full_index 数据 + 添加 count/avg
            NEW_COURSE_ENTRY=$(jq --argjson full_val "$FULL_VALUE" --argjson count "$COUNT" --argjson avg "$AVG" '
              $full_val | .count = $count | .avg = $avg
            ')

            # 写入到 with_comment_index.json
            jq --arg key "$DISPLAY_KEY" --argjson new_entry "$NEW_COURSE_ENTRY" '
              .courses[$key] = $new_entry
            ' data/with_comment_index.json > temp_index.json && mv temp_index.json data/with_comment_index.json

            echo "  -> Updated entry for '$DISPLAY_KEY' (sqid=$sqid)"

          done < ../updated_sqids.txt

      - name: Update reviews_latest.json
        working-directory: ./main-workspace
        run: |
          LATEST_FILE="data/reviews_latest.json"
          MAX_COUNT=${{ env.MAX_LATEST_REVIEWS }}

          if [ ! -f "$LATEST_FILE" ]; then
            echo "[]" > "$LATEST_FILE"
            echo "Initialized empty $LATEST_FILE"
          fi

          NEW_REVIEWS=$(cat ../new_reviews_for_latest.json)
          jq --argjson new_reviews "$NEW_REVIEWS" --argjson max_count "$MAX_COUNT" '
            ($new_reviews + .) | .[0:$max_count]
          ' "$LATEST_FILE" > temp_latest.json

          mv temp_latest.json "$LATEST_FILE"
          echo "✅ Updated $LATEST_FILE. Total now: $(jq length "$LATEST_FILE")"

      - name: Update manifest.json total_reviews
        working-directory: ./main-workspace
        run: |
          MANIFEST="data/manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ Error: $MANIFEST not found!"
            exit 1
          fi

          INCREMENT=$(cat ../review_count.txt)
          if [ -z "$INCREMENT" ]; then
            INCREMENT=0
          fi

          if [ "$INCREMENT" -gt 0 ]; then
            echo "Incrementing total_reviews by $INCREMENT"
            jq --argjson inc "$INCREMENT" '.total_reviews += $inc' "$MANIFEST" > temp_manifest.json
            mv temp_manifest.json "$MANIFEST"
          else
            echo "No new reviews, manifest unchanged."
          fi

      - name: Commit changes to main branch
        working-directory: ./main-workspace
        run: |
          git add data/courses/ data/with_comment_index.json data/reviews_latest.json data/manifest.json
          if ! git diff --cached --quiet; then
            git commit -m "${{ env.FILES }}"
            git push origin HEAD:main
            echo "✅ Changes pushed to main branch."
          else
            echo "ℹ️ No changes to commit on main branch."
          fi

      - name: Update data branch archive processed files and log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          git checkout data
          git pull origin data --quiet
          mkdir -p archive

          git config user.name "GitHub Actions"
          git config user.email ""

          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          LOG_ENTRY="## $TIMESTAMP - Processed: ${{ env.FILES }}"

          if [ -n "${{ env.FILES }}" ]; then
            for file in ${{ env.FILES }}; do
              if [ -f "$file" ]; then
                mv "$file" "archive/$(basename "$file")"
              fi
            done
            echo "$LOG_ENTRY" >> log.txt
          else
            echo "$LOG_ENTRY (no valid files)" >> log.txt
          fi

          git add .
          git rm new_reviews_for_latest.json main-workspace
          git commit -m "chore(data): archive processed reviews and update log [skip ci]"
          git push origin data

      - name: Final Summary
        run: |
          echo "🎉 Workflow completed successfully!"
          echo "Processed files: ${{ env.FILES }}"
          INCR=$(cat main-workspace/../review_count.txt)
          echo "New reviews added: $INCR"
          echo "Check 'log.txt' on the 'data' branch for a full history."