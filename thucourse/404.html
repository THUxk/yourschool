<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | THU选课社区</title>
    <link rel="stylesheet" href="/thucourse/css/style.css">
    <style>
        .error-container {
            text-align: center;
            padding: 80px 20px;
        }
        .error-code {
            font-size: 72px;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-message {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="nav-wrap">
            <a href="/thucourse/index.html" class="logo">THU选课社区</a>
        </div>
    </div>

    <div class="container">
        <div class="error-container">
            <div class="error-code">404</div>
            <div class="error-message">抱歉，您访问的页面不存在。</div>
            <a href="/thucourse/index.html" class="btn-primary">返回首页</a>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="/thucourse/about.html">关于</a>
            <a href="/thucourse/faq.html">常见问题</a>
        </div>
        <div>&copy;2024 THU选课社区</div>
    </footer>

    <script>
        // 清洁 URL 重定向：处理无 .html 后缀的路径
        (function() {
            var path = window.location.pathname;

            // 课程详情短链接: /course/12345 → /course.html?sqid=12345
            // （_redirects 已处理，这里作为兜底）
            var courseMatch = path.match(/^\/course\/(\d+)/);
            if (courseMatch) {
                window.location.replace('course.html?sqid=' + courseMatch[1]);
                return;
            }

            // 清洁 URL 映射表：无后缀 → .html
            var cleanMap = {
                '/thucourse/index':      'thucourse/index.html',
                '/thucourse/courses':    'thucourse/courses.html',
                '/thucourse/course':     'thucourse/course.html',
                '/thucourse/search':     'thucourse/search.html',
                '/thucourse/statistics': 'thucourse/statistics.html',
                '/thucourse/about':      'thucourse/about.html',
                '/thucourse/faq':        'thucourse/faq.html',
                '/thucourse/new-review': 'thucourse/new-review.html'
            };

            if (cleanMap[path]) {
                window.location.replace(cleanMap[path]);
                return;
            }

            // 如果路径以 / 结尾且去掉尾部斜杠后有映射，也重定向
            if (path.endsWith('/')) {
                var trimmed = path.slice(0, -1);
                if (cleanMap[trimmed]) {
                    window.location.replace(cleanMap[trimmed]);
                    return;
                }
            }
        })();
    </script>
</body>
</html>
